<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(155deg, #0040e0 0%, #2e5bff 60%, #1a3fc4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      transition: opacity 0.4s ease;
    }

    #page-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .page-loader-logo {
      width: 180px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.18));
    }

    .page-loader-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: loader-spin 0.85s linear infinite;
    }

    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }

    /* Botó de prova */
    #test-btn {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #0040e0;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 10000;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div id="page-loader">
    <img class="page-loader-logo" src="../jukebox/static/jukebox/img/DJJukebox_logo.png" alt="DJJukebox">
    <div class="page-loader-spinner"></div>
  </div>

  <button id="test-btn">Simular càrrega completa</button>

  <script>
    document.getElementById('test-btn').addEventListener('click', function() {
      var loader = document.getElementById('page-loader');
      loader.classList.add('fade-out');
      setTimeout(function() {
        loader.style.display = 'none';
        document.getElementById('test-btn').textContent = 'Tornar a mostrar';
        document.getElementById('test-btn').onclick = function() { location.reload(); };
      }, 400);
    });
  </script>

</body>
</html>
