<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fe; color: #191c1f; }
        .font-headline { font-family: 'Epilogue', sans-serif; }
        .glass-nav {
            background: rgba(248, 249, 254, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .pulse-gradient {
            background: linear-gradient(135deg, #0040e0 0%, #2e5bff 100%);
        }
        .ambient-shadow {
            box-shadow: 0 20px 40px -15px rgba(0, 64, 224, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 glass-nav">
<div class="px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight">Party Name</h1>
</div>
<div class="flex items-center">
<button class="w-10 h-10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-6 pb-32">
<!-- Hero Profile Section -->
<section class="mt-8 flex flex-col items-center">
<div class="relative group">
<div class="w-32 h-32 rounded-xl overflow-hidden ambient-shadow ring-4 ring-surface-container-lowest">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Modern professional headshot of a young woman smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD633jA8y3MafCIh3oNAikNzROu6FZSNmTSU3b7Db9CLRFOljHaJ23EBTkpw9Rc0_pu2vKCo5ohg_88bbCC_0ZbN1HYT4pWoLwCPgdg7HLX3TWiLYv2-yKUOJUL7YAVYrC1p2nxmHhqyYTnFk8CloJ7qgE-662LXLc3tRzom5orYTdJMSQSmBBVkD4okUh9GD1VZMxiaRsMvnUR5Nd4-7XefIMtMUVeR_6FXYGFTpMAEhEWZ5Yo7c7klI3fMAQG2w9wM6a2RkU1HR0"/>
</div>
<div class="absolute -bottom-2 -right-2 w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center border-4 border-background">
<span class="material-symbols-outlined text-[18px] text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div class="mt-6 text-center">
<span class="font-label text-tertiary text-[12px] font-bold tracking-widest uppercase mb-1 block">Premium Member</span>
<h2 class="font-headline font-extrabold text-3xl text-on-surface tracking-tighter">Alex Rivers</h2>
<p class="font-body text-outline mt-1">alex.rivers@spotify.me</p>
</div>
</section>
<!-- Connection Status Bento Card -->
<section class="mt-10">
<div class="bg-surface-container-low rounded-xl p-8 flex flex-col items-start gap-4 relative overflow-hidden">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[#1DB954] flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[20px]">graphic_eq</span>
</div>
<span class="font-headline font-semibold text-lg">Spotify Status</span>
</div>
<div class="flex flex-col gap-1">
<p class="font-body text-on-surface text-lg font-medium">Currently Disconnected</p>
<p class="font-body text-outline text-sm leading-relaxed">Connect to sync your playlists and share your groove with the party.</p>
</div>
<button class="pulse-gradient text-on-primary px-8 py-4 rounded-full font-headline font-bold flex items-center gap-2 mt-2 ambient-shadow">
                    Connect Spotify
                    <span class="material-symbols-outlined text-[20px]">open_in_new</span>
</button>
<!-- Asymmetric Decorative Element -->
<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary opacity-[0.03] rounded-full blur-3xl"></div>
</div>
</section>
<!-- Settings List (No-Line Grid) -->
<section class="mt-12 space-y-2">
<h3 class="font-headline font-bold text-xl px-2 mb-6">Preferences</h3>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined text-primary">settings</span>
</div>
<span class="font-headline font-semibold text-on-surface text-lg">App Settings</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined text-primary">history</span>
</div>
<span class="font-headline font-semibold text-on-surface text-lg">Song Request History</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg hover:bg-surface-container transition-colors group mt-10">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error">logout</span>
</div>
<span class="font-headline font-semibold text-error text-lg">Log Out</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</section>
<!-- Branding Footer -->
<section class="mt-16 text-center opacity-40 grayscale">
<p class="font-label text-[10px] uppercase tracking-[4px] font-black">DJJukebox v2.4.0</p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 glass-nav h-20 px-4 border-t border-outline-variant border-opacity-10">
<div class="flex h-full items-center justify-around max-w-lg mx-auto">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-outline group-hover:text-primary">music_note</span>
<span class="font-label text-[11px] font-medium text-outline group-hover:text-primary">Songs</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-outline group-hover:text-primary">swipe</span>
<span class="font-label text-[11px] font-medium text-outline group-hover:text-primary">Match</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-outline group-hover:text-primary">add_circle</span>
<span class="font-label text-[11px] font-medium text-outline group-hover:text-primary">Request</span>
</a>
<a class="flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-[11px] font-bold text-primary">Profile</span>
</a>
</div>
</nav>
