services:
  - type: web
    name: dj-jukebox-dev
    env: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py sync_site && python manage.py setup_production && gunicorn dj_jukebox.wsgi:application --workers 1 --timeout 90
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DATABASE_URL
        fromDatabase:
          name: dj-jukebox-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "1"
      - key: ANALYZE_YTDLP_PER_ATTEMPT_TIMEOUT
        value: "8"
      - key: ANALYZE_YTDLP_MAX_WALL_SECONDS
        value: "18"
      - key: ANALYZE_AUDIO_SECONDS
        value: "20"
      - key: ANALYZE_AUDIO_SAMPLE_RATE
        value: "16000"
      - key: SITE_DOMAIN
        sync: false
      - key: SITE_NAME
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: dj-jukebox-db
    plan: free
    databaseName: dj_jukebox
    user: dj_jukebox
