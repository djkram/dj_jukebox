services:
  - type: web
    name: dj-jukebox-dev
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py sync_site && python manage.py setup_production
    startCommand: gunicorn dj_jukebox.wsgi:application
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DATABASE_URL
        fromDatabase:
          name: dj-jukebox-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SITE_DOMAIN
        sync: false
      - key: SITE_NAME
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: dj-jukebox-db
    plan: free
    databaseName: dj_jukebox
    user: dj_jukebox
